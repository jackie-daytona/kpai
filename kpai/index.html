<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPAI - KPI Evaluator</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            color: #222;
            padding: 30px 20px;
        }
        h1 { color: #003366; margin-bottom: 6px; }
        p.subtitle { color: #666; margin-bottom: 20px; }
        button {
            background: #003366;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background: #0055a5; }
        button:disabled { background: #999; cursor: not-allowed; }
        #status { color: #666; font-style: italic; margin-bottom: 20px; }

        .scorecard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: white;
            border-radius: 6px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            border-left: 10px solid #ccc;
        }
        .kpi-card.red { border-left-color: #e53935; }
        .kpi-card.yellow { border-left-color: #fdd835; }
        .kpi-card.green { border-left-color: #43a047; }
        .kpi-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
        .kpi-card .value { font-size: 22px; font-weight: bold; }
        .kpi-card .meta { font-size: 12px; color: #666; margin-top: 4px; }

        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-box {
            background: white;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .chart-box h3 { margin-bottom: 14px; color: #003366; font-size: 14px; }

        #report {
            background: white;
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            line-height: 1.7;
        }
        #report h1, #report h2, #report h3 { color: #003366; margin: 16px 0 8px; }
        #report p { margin-bottom: 10px; }
        #report ul { padding-left: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>KPAI — Airline KPI Evaluator</h1>
    <p class="subtitle">Station Performance Dashboard</p>
    <div style="display: flex; gap: 12px; margin-bottom: 20px; align-items: center;">
        <select id="station" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 15px;">
            <option value="ATL">ATL - Atlanta</option>
            <option value="JFK">JFK - New York</option>
            <option value="LAX">LAX - Los Angeles</option>
            <option value="ORD">ORD - Chicago</option>
            <option value="BOS">BOS - Boston</option>
        </select>
        <select id="month" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 15px;">
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4" selected>April</option>
        </select>
        <select id="year" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 15px;">
            <option value="2026">2026</option>
        </select>
        <button id="btn" onclick="runEval()">Run Evaluation</button>
    </div>
    <div id="status"></div>
    <div class="scorecard" id="scorecard"></div>
    <div class="charts">
        <div class="chart-box"><h3>Actual vs Target</h3><canvas id="barChart"></canvas></div>
        <div class="chart-box"><h3>YoY Change</h3><canvas id="yoyChart"></canvas></div>
    </div>
    <div id="report"></div>

    <script>
        let barChart, yoyChart;

        function getStatus(metric, actual, target) {
            const ratio = actual / target;
            const lowerIsBetter = ['cancellation_rate', 'cost_per_available_seat_mile_cents', 'baggage_claim_rate_per_1000'];
            if (lowerIsBetter.includes(metric)) {
                if (actual <= target) return 'green';
                if (actual <= target * 1.1) return 'yellow';
                return 'red';
            } else {
                if (ratio >= 0.97) return 'green';
                if (ratio >= 0.90) return 'yellow';
                return 'red';
            }
        }

        function buildScorecard(data) {
            const scorecard = document.getElementById('scorecard');
            scorecard.innerHTML = '';

            const metrics = [
                { label: 'On-Time Performance', key: 'on_time_performance', section: 'operational', format: v => (v * 100).toFixed(1) + '%' },
                { label: 'Load Factor', key: 'load_factor', section: 'operational', format: v => (v * 100).toFixed(1) + '%' },
                { label: 'Cancellation Rate', key: 'cancellation_rate', section: 'operational', format: v => (v * 100).toFixed(1) + '%' },
                { label: 'Revenue / ASM', key: 'revenue_per_available_seat_mile_cents', section: 'financial', format: v => v + '¢' },
                { label: 'Cost / ASM', key: 'cost_per_available_seat_mile_cents', section: 'financial', format: v => v + '¢' },
                { label: 'Total Revenue', key: 'total_revenue_millions', section: 'financial', format: v => '$' + (v / 1000).toFixed(2) + 'B' },
                { label: 'CSAT', key: 'csat_score', section: 'customer', format: v => v + ' / 5' },
                { label: 'NPS', key: 'net_promoter_score', section: 'customer', format: v => v },
                { label: 'Baggage Claims', key: 'baggage_claim_rate_per_1000', section: 'customer', format: v => v + ' / 1k' },
            ];

            metrics.forEach(m => {
                const d = data[m.section][m.key];
                const status = getStatus(m.key, d.mtd, d.target);
                const yoy = d.mtd - d.prior_year_mtd;
                const yoyStr = (yoy >= 0 ? '+' : '') + (Math.abs(yoy) < 1 ? (yoy * 100).toFixed(1) + '%' : yoy.toFixed(1));

                scorecard.innerHTML += `
                    <div class="kpi-card ${status}">
                        <div class="label">${m.label}</div>
                        <div class="value">${m.format(d.mtd)}</div>
                        <div class="meta">Target: ${m.format(d.target)} | YoY: ${yoyStr}</div>
                    </div>`;
            });
        }

        function buildCharts(data) {
            const labels = ['OTP', 'Load Factor', 'RASM', 'CASM', 'CSAT', 'NPS'];
            const actuals = [
                data.operational.on_time_performance.mtd * 100,
                data.operational.load_factor.mtd * 100,
                data.financial.revenue_per_available_seat_mile_cents.mtd,
                data.financial.cost_per_available_seat_mile_cents.mtd,
                data.customer.csat_score.mtd,
                data.customer.net_promoter_score.mtd
            ];
            const targets = [
                data.operational.on_time_performance.target * 100,
                data.operational.load_factor.target * 100,
                data.financial.revenue_per_available_seat_mile_cents.target,
                data.financial.cost_per_available_seat_mile_cents.target,
                data.customer.csat_score.target,
                data.customer.net_promoter_score.target
            ];
            const priorYear = [
                data.operational.on_time_performance.prior_year_mtd * 100,
                data.operational.load_factor.prior_year_mtd * 100,
                data.financial.revenue_per_available_seat_mile_cents.prior_year_mtd,
                data.financial.cost_per_available_seat_mile_cents.prior_year_mtd,
                data.customer.csat_score.prior_year_mtd,
                data.customer.net_promoter_score.prior_year_mtd
            ];

            if (barChart) barChart.destroy();
            if (yoyChart) yoyChart.destroy();

            barChart = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: 'Actual', data: actuals, backgroundColor: '#003366' },
                        { label: 'Target', data: targets, backgroundColor: '#90caf9' }
                    ]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });

            yoyChart = new Chart(document.getElementById('yoyChart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'YoY Change',
                        data: actuals.map((a, i) => a - priorYear[i]),
                        backgroundColor: actuals.map((a, i) => a >= priorYear[i] ? '#43a047' : '#e53935')
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }

        async function runEval() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const report = document.getElementById('report');
            const station = document.getElementById('station').value;
            const month = document.getElementById('month').value;
            const year = document.getElementById('year').value;

            btn.disabled = true;
            status.textContent = `Fetching KPI data for ${station} ${month}/${year}...`;

            try {
                const kpiRes = await fetch(`http://127.0.0.1:8000/kpis/${station}/${year}/${month}`);
                const kpiData = await kpiRes.json();
                buildScorecard(kpiData);
                buildCharts(kpiData);

                status.textContent = 'Running AI evaluation...';
                const evalRes = await fetch(`http://127.0.0.1:8000/evaluate/${station}/${year}/${month}`, { method: 'POST' });
                const evalData = await evalRes.json();
                report.innerHTML = marked.parse(evalData.evaluation);
                status.textContent = `Done — ${station} ${month}/${year}`;
            } catch (err) {
                status.textContent = 'Error: could not reach the API.';
                console.error(err);
            }

            btn.disabled = false;
        }
    </script>
</body>
</html>
